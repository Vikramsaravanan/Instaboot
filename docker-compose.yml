version: '3.9'

services:
  # ── PostgreSQL with pgvector ─────────────────────────────────────────────────
  postgres:
    image: ankane/pgvector:latest
    container_name: multiagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: multiagent_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d multiagent_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node.js / Express) ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multiagent-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/multiagent_db
      EMBEDDING_MODEL: Xenova/all-MiniLM-L6-v2
      TOP_K: 5
      CHUNK_SIZE: 500
      CHUNK_OVERLAP: 50
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - model_cache:/app/.cache   # cache HuggingFace model weights
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); const req = http.request('http://localhost:5000/api/health', res => process.exit(res.statusCode===200 ? 0 : 1)); req.on('error', () => process.exit(1)); req.end();\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Frontend (React) ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multiagent-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  model_cache:
