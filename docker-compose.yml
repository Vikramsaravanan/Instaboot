version: '3.9'

services:
  # ── Backend (Flask + Groq + ChromaDB) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multiagent-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: llama-3.1-8b-instant
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      COLLECTION_NAME: instaboot_docs
      PERSIST_DIRECTORY: /app/data/chroma
      DB_PATH: /app/data/app.db
      UPLOAD_DIR: /app/uploads
      TOP_K: 3
      CHUNK_SIZE: 800
      CHUNK_OVERLAP: 120
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
      - model_cache:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/api/health').status == 200 else 1)\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Frontend (React → nginx → Flask) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multiagent-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    # REACT_APP_API_URL must be empty so the nginx proxy (/api → backend:5000) is used
    # Do NOT set it to localhost:5000 inside Docker (that's the host, not the container)
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
  backend_uploads:
  model_cache:
